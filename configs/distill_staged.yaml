# Staged Distillation Training Configuration
# Stage 1: VLM distillation (VLM Logits KD + VLM Hidden KD)
# Stage 2: Expert + trajectory distillation (Expert Hidden KD + Traj L2)

teacher:
  model_name: "nvidia/Alpamayo-1.5-10B"
  dtype: bfloat16
  top_p: 0.98
  temperature: 0.6
  num_traj_samples: 1
  max_generation_length: 256
  collect_expert_hiddens: true
  hidden_dim: 4096

student:
  vlm_name_or_path: "Qwen/Qwen3-VL-2B-Instruct"
  attn_implementation: flash_attention_2
  expert_attn_implementation: sdpa
  dtype: bfloat16
  hidden_dim: 2048

stages:
  vlm:
    num_epochs: 5
    loss:
      vlm_logits_weight: 1.0
      expert_hidden_weight: 0.0
      vlm_hidden_weight: 0.5
      trajectory_l2_weight: 0.0
      temperature: 2.0
    optimizer:
      _target_: torch.optim.AdamW
      lr: 1.0e-4
      weight_decay: 0.01
    scheduler:
      _target_: torch.optim.lr_scheduler.CosineAnnealingLR
      T_max: ${stages.vlm.num_epochs}
      eta_min: 1.0e-6

  expert:
    num_epochs: 10
    loss:
      vlm_logits_weight: 0.0
      expert_hidden_weight: 0.5
      vlm_hidden_weight: 0.0
      trajectory_l2_weight: 1.0
      temperature: 2.0
    optimizer:
      _target_: torch.optim.AdamW
      lr: 5.0e-5
      weight_decay: 0.01
    scheduler:
      _target_: torch.optim.lr_scheduler.CosineAnnealingLR
      T_max: ${stages.expert.num_epochs}
      eta_min: 1.0e-6

training:
  batch_size: 1
  gradient_accumulation_steps: 4
  mixed_precision: bfloat16
  max_grad_norm: 1.0
  save_every_n_epochs: 2
  output_dir: "outputs/distilled_staged"
  resume_from_checkpoint: null
  auto_next_stage: true

data:
  dataset: "nvidia/PhysicalAI-Autonomous-Vehicles"
  cache_dir: null
  revision: "b719eea7f0a63619ef51ec7f54178af0937ef050"
  clip_ids: null
  sample_step_us: 1000000
  history_us: 1500000
  future_us: 6400000
  shuffle: true
  seed: 42
